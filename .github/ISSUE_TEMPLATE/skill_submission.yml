name: Skill request / submission
description: Request a new skill or submit one for review
title: "[Skill] "
labels: ["skill-submission"]

body:
  - type: input
    id: skill-name
    attributes:
      label: Skill name
      placeholder: e.g. "Contract Reviewer"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Data
        - Productivity
        - Communication
        - Strategy
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What should this skill do?
      description: Describe what Claude should be able to do with this skill loaded.
      placeholder: "This skill should help Claude review contract clauses for risks, flag ambiguous language, and summarise key obligations."
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example prompt
      placeholder: "Review this NDA and flag any clauses that are unusual or risky for us as the vendor."

  - type: textarea
    id: skill-content
    attributes:
      label: Skill content (if you're submitting, not just requesting)
      description: Paste the SKILL.md content here, or leave blank if you're requesting.
      render: markdown

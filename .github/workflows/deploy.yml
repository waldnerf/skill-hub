name: Validate, Generate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate plugins & generate marketplace.json
        run: node scripts/generate-marketplace.js
        # This step:
        # 1. Validates every plugin folder (schema, structure, SKILL.md)
        # 2. Generates public/marketplace.json with tag index
        # Fails the build if any plugin is invalid

      - name: Build
        run: npm run build
        # Vite builds the React app into /dist
        # marketplace.json is included in /dist via public/ folder

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: skill-hub
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # PRs → preview URL posted automatically to the PR
          # Merges to main → production deploy (~30 seconds)
